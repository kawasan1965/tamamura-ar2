<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たまむらふぃーるど - レベル2</title>
    <style>
        :root { --accent: #facc15; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 2; pointer-events: none; }

        .main-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; z-index: 5;
        }

        .hud { width: 100%; display: flex; justify-content: space-between; padding: 15px; }
        .hud-card { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; border: 1px solid var(--accent); backdrop-filter: blur(4px); }

        .arena { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; min-height: 0; }
        
        /* 32x32ドットをくっきり拡大描画するキャンバス設定 */
        #monsterCanvas { 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            width: 65vw; height: 65vw; 
            max-width: 260px; max-height: 260px;
            filter: drop-shadow(0 0 15px var(--accent));
            animation: floatL2 2.5s infinite alternate ease-in-out;
        }
        @keyframes floatL2 { from { transform: translateY(0px); } to { transform: translateY(-15px); } }

        .message-board { width: 100%; display: flex; justify-content: center; padding: 5px 15px; }
        #instruction { 
            background: rgba(0,0,0,0.85); padding: 10px 15px; border-radius: 20px; 
            font-size: 14px; font-weight: bold; text-align: center; width: 100%; max-width: 340px;
            border: 2px solid var(--accent); backdrop-filter: blur(4px); color: white;
        }

        .controls { 
            width: 100%; background: rgba(0, 0, 0, 0.9); padding: 15px 15px 35px 15px; 
            border-radius: 24px 24px 0 0; display: flex; flex-direction: column; gap: 12px; 
            border-top: 2px solid var(--accent); backdrop-filter: blur(10px);
        }
        .btn-d { width: 100%; background: linear-gradient(135deg, #ef4444, #991b1b); border: none; padding: 18px 0; color: white; font-size: 22px; font-weight: bold; border-radius: 15px; box-shadow: 0 4px #7f1d1d; cursor: pointer; transition: all 0.1s; }
        .btn-d:active { transform: translateY(2px); box-shadow: 0 2px #7f1d1d; }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.98); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; text-align:center; }
        .action-btn { background: #10b981; color: white; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 80%; max-width: 280px; box-shadow: 0 4px #059669; }
        
        .shake { animation: shakeAnimL2 0.15s linear; }
        @keyframes shakeAnimL2 { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px,0); } 75% { transform: translate(8px,0); } }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <div id="flash"></div>

    <div id="qrCheckOverlay" class="overlay">
        <h2 style="color:var(--accent); font-size:28px; margin-bottom:20px;">LEVEL 2 起動完了</h2>
        <p style="line-height:1.6; margin-bottom:30px;">現地QRコードの解析に成功しました。<br>高エネルギー反応のオリジナル守護獣を展開します。</p>
        <button class="action-btn" onclick="startL2Game()">防衛戦を開始！</button>
    </div>

    <div class="main-wrapper" id="mainUi" style="display:none;">
        <div class="hud">
            <div class="hud-card">LEVEL 2</div>
            <div class="hud-card" id="loc-name">玉村町・要地点</div>
            <div class="hud-card">ボスHP: <span id="hp-val">500</span></div>
        </div>

        <div class="arena">
            <canvas id="monsterCanvas" width="32" height="32"></canvas>
        </div>

        <div class="message-board">
            <div id="instruction">⚠️ 警告：強力な個体が出現！</div>
        </div>

        <div class="controls">
            <button class="btn-d" onclick="attackL2()">超・攻撃ボタンD</button>
        </div>
    </div>

    <script>
        let hp = 500;
        let audioCtx;
        const canvas = document.getElementById('monsterCanvas');
        const ctx = canvas.getContext('2d');

        function startL2Game() {
            document.getElementById('qrCheckOverlay').style.display = 'none';
            document.getElementById('mainUi').style.display = 'flex';
            
            // 音声システム再始動
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e){}

            // カメラ起動
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(s => { document.getElementById('video').srcObject = s; })
                    .catch(() => { console.log("疑似AR起動"); });
            }
            
            // ドット絵のレンダリング
            drawMonster();
        }

        function drawMonster() {
            const params = new URLSearchParams(window.location.search);
            const dotData = params.get('data') || "";
            
            ctx.clearRect(0, 0, 32, 32);
            
            // カナメ・ドラゴン用の黄金サイバーカラー
            let mainColor = "#facc15"; 
            let charIndex = 0;
            
            for(let y=0; y<32; y++) {
                for(let x=0; x<32; x+=4) {
                    const hexChar = dotData[charIndex] || "0";
                    const num = parseInt(hexChar, 16);
                    charIndex++;
                    
                    for(let bit=0; bit<4; bit++) {
                        const mask = 1 << (3 - bit);
                        if((num & mask) !== 0) {
                            ctx.fillStyle = mainColor;
                            ctx.fillRect(x + bit, y, 1, 1);
                        }
                    }
                }
            }
            
            // コミカルな目を合成
            ctx.fillStyle = "white";
            ctx.fillRect(11, 12, 2, 2); ctx.fillRect(19, 12, 2, 2);
            ctx.fillStyle = "black";
            ctx.fillRect(11, 13, 1, 1); ctx.fillRect(19, 13, 1, 1);
        }

        function attackL2() {
            if(hp <= 0) return;

            hp -= 50;
            if(hp < 0) hp = 0;
            document.getElementById('hp-val').innerText = hp;
            
            // ヒットエフェクト
            document.getElementById('flash').style.opacity = '0.5';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 50);
            
            canvas.classList.add('shake');
            setTimeout(() => canvas.classList.remove('shake'), 150);
            
            // ピコピコ攻撃音
            playTone(120, 'sawtooth', 0.1, 0.2);
            playTone(80, 'square', 0.15, 0.3);

            if(hp <= 0) {
                document.getElementById('instruction').innerText = "討伐成功！玉村町の平和を守った！";
                playTone(523.25, 'square', 0.1, 0.1);
                setTimeout(() => playTone(659.25, 'square', 0.1, 0.1), 100);
                setTimeout(() => playTone(783.99, 'square', 0.4, 0.1), 200);
                alert("レベル2 討伐成功！玉村町の平和を守りました！");
            }
        }

        function playTone(freq, type, duration, volume) {
            if(!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }
    </script>
</body>
</html>
