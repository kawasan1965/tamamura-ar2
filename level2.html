<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たまむらふぃーるど - レベル2ボス戦</title>
    <style>
        :root { --accent: #ef4444; --yellow: #facc15; --blue: #3b82f6; --green: #10b981; --purple: #a855f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; font-family: sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 2; pointer-events: none; }

        .main-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; z-index: 5;
        }

        .hud { width: 100%; display: flex; justify-content: space-between; padding: 15px; }
        .hud-card { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; border: 2px solid #ef4444; backdrop-filter: blur(4px); }
        #timer-text { color: #f87171; font-size: 14px; }

        .arena { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; min-height: 0; }
        
        /* ★改善1：配置を少し下げ(margin-top)、かつ全方位に動くアニメーション(bossDynamic)を適用 */
        #monsterCanvas { 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            width: 60vw; height: 60vw; max-width: 220px; max-height: 220px;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.7));
            margin-top: 50px; 
            animation: bossDynamic 4s infinite ease-in-out; 
        }
        
        /* ★改善2：上下・左右に動き回るダイナミックアニメーション */
        @keyframes bossDynamic { 
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(35px, 15px) scale(1.02); }
            50% { transform: translate(0, 30px) scale(1.05); }
            75% { transform: translate(-35px, 15px) scale(1.02); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .limit-bar-frame { width: 240px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 15px; overflow: hidden; border: 1px solid black; }
        #limit-bar { width: 100%; height: 100%; background: #34d399; transition: width 0.1s linear; }

        .message-board { width: 100%; display: flex; justify-content: center; padding: 5px 15px; }
        #instruction { 
            background: rgba(0,0,0,0.9); padding: 12px 15px; border-radius: 20px; 
            font-size: 15px; font-weight: bold; text-align: center; width: 100%; max-width: 340px;
            border: 2px solid #ef4444; backdrop-filter: blur(4px); color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .controls { 
            width: 100%; background: rgba(15, 23, 42, 0.95); padding: 15px 15px 35px 15px; 
            border-radius: 24px 24px 0 0; display: flex; flex-direction: column; gap: 12px; 
            border-top: 2px solid #ef4444;
        }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .abc-btn { background: #1e293b; color: #64748b; border: 2px solid #334155; padding: 16px 0; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.1s; }
        .abc-btn.highlight1 { background: #2563eb !important; color: white !important; border-color: #60a5fa !important; box-shadow: 0 0 10px #2563eb; }
        .abc-btn.highlight2 { background: #b91c1c !important; color: white !important; border-color: #f87171 !important; box-shadow: 0 0 10px #b91c1c; }
        
        .btn-d { width: 100%; background: linear-gradient(135deg, #475569, #334155); border: none; padding: 18px 0; color: #94a3b8; font-size: 22px; font-weight: bold; border-radius: 15px; box-shadow: 0 4px #1e293b; transition: all 0.1s; }
        .btn-d.ready { background: linear-gradient(135deg, #ef4444, #b91c1c) !important; color: white !important; box-shadow: 0 4px #7f1d1d, 0 0 15px #ef4444 !important; cursor: pointer; }
        .btn-d:active { transform: translateY(2px); }

        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.98); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; text-align:center; }
        .action-btn { background: #ef4444; color: white; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 80%; max-width: 280px; box-shadow: 0 4px #991b1b; }
        
        .shake { animation: shakeL2 0.1s linear infinite alternate; }
        @keyframes shakeL2 { from { transform: translate(-8px, 20px); } to { transform: translate(8px, 30px); } }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <div id="flash"></div>

    <div id="qrCheckOverlay" class="overlay">
        <h2 style="font-size:28px; margin-bottom:20px; color:#ef4444;">⚠️ BOSS WARNING ⚠️</h2>
        <p style="line-height:1.6; margin-bottom:30px; color:#cbd5e1;">たまむら古文書の封印が解かれました。<br>極めて危険な「レベル2守護獣」を検知！</p>
        <button class="action-btn" onclick="startL2Game()">防衛戦を開始！</button>
    </div>

    <div class="main-wrapper" id="mainUi" style="display:none;">
        <div class="hud">
            <div class="hud-card">LEVEL 2 (究極)</div>
            <div class="hud-card" id="timer-card">作戦時間: <span id="timer-text">60.0</span>秒</div>
            <div class="hud-card">BOSS HP:
